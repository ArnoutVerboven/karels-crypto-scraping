name: optimize

# Manually-triggered prompt optimization for the word solver (DSPy / MIPROv2).
# Set OPENAI_API_KEY / OPENAI_BASE_URL (and optionally OPENAI_MODEL) as repo
# secrets first. The optimised prompt + metrics are committed to
# karels-crypto-solving/optimization_results/.

on:
  workflow_dispatch:
    inputs:
      auto:
        description: "MIPROv2 search budget"
        type: choice
        options: ["light", "medium", "heavy"]
        default: "light"
      reveal:
        description: "Helper letters revealed in the pattern"
        type: choice
        options: ["none", "partial", "all"]
        default: "none"
      reveal_fraction:
        description: "Fraction revealed when reveal=partial"
        type: string
        default: "0.5"
      demos:
        description: "Max few-shot demos (0 = instruction-only)"
        type: string
        default: "0"
      model:
        description: "Model override (blank = OPENAI_MODEL secret / default)"
        type: string
        default: ""

permissions:
  contents: write

concurrency:
  group: optimize
  cancel-in-progress: false

jobs:
  optimize:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: karels-crypto-solving
    env:
      OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
      OPENAI_BASE_URL: ${{ secrets.OPENAI_BASE_URL }}
      OPENAI_MODEL: ${{ secrets.OPENAI_MODEL }}
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true
          working-directory: karels-crypto-solving

      - name: Sync dependencies (with optimize extra)
        run: uv sync --frozen --extra optimize

      - name: Run prompt optimization
        run: |
          MODEL_ARG=""
          if [ -n "${{ inputs.model }}" ]; then MODEL_ARG="--model ${{ inputs.model }}"; fi
          uv run karels-crypto-optimize \
            --auto "${{ inputs.auto }}" \
            --reveal "${{ inputs.reveal }}" \
            --reveal-fraction "${{ inputs.reveal_fraction }}" \
            --demos "${{ inputs.demos }}" \
            $MODEL_ARG

      - name: Commit optimization results
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add optimization_results/
          if git diff --cached --quiet; then
            echo "No optimization result changes."
          else
            git commit -m "optimize: word-solver prompt (reveal=${{ inputs.reveal }}, auto=${{ inputs.auto }})"
            git push
          fi
