name: optimize

# Manually-triggered prompt optimization for the word solver (DSPy / MIPROv2).
# Configure credentials first (Settings -> Secrets and variables -> Actions):
#   - OPENAI_API_KEY  as a repository *secret* (sensitive)
#   - OPENAI_BASE_URL as a repository *variable* (not sensitive)
#   - OPENAI_MODEL    as a repository *variable* (optional; not sensitive)
# The optimised prompt + metrics are committed to
# karels-crypto-solving/optimization_results/.

on:
  workflow_dispatch:
    inputs:
      auto:
        description: "Search budget preset ('none' = manual num_candidates/num_trials)"
        type: choice
        options: ["light", "medium", "heavy", "none"]
        default: "light"
      num_candidates:
        description: "Instruction candidates (only when auto=none)"
        type: string
        default: ""
      num_trials:
        description: "Optimization trials (only when auto=none)"
        type: string
        default: ""
      max_tokens:
        description: "Max output tokens per LM call"
        type: string
        default: "1000"
      minibatch_size:
        description: "Minibatch size (blank = default 35, clamped to valset)"
        type: string
        default: ""
      max_examples:
        description: "Cap number of labelled words (blank = all)"
        type: string
        default: ""
      demos:
        description: "Max few-shot demos (0 = instruction-only)"
        type: string
        default: "0"
      reveal:
        description: "Helper letters revealed in the pattern"
        type: choice
        options: ["none", "partial", "all"]
        default: "none"
      reveal_fraction:
        description: "Fraction revealed when reveal=partial"
        type: string
        default: "0.5"
      model:
        description: "Model override (blank = OPENAI_MODEL secret / default)"
        type: string
        default: ""

permissions:
  contents: write

concurrency:
  group: optimize
  cancel-in-progress: false

jobs:
  optimize:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: karels-crypto-solving
    env:
      # The API key is sensitive -> secret. Base URL and model are not
      # sensitive -> repository variables (with a secret fallback, so it works
      # whichever you configure).
      OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
      OPENAI_BASE_URL: ${{ vars.OPENAI_BASE_URL || secrets.OPENAI_BASE_URL }}
      OPENAI_MODEL: ${{ vars.OPENAI_MODEL || secrets.OPENAI_MODEL }}
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true
          working-directory: karels-crypto-solving

      - name: Sync dependencies (with optimize extra)
        run: uv sync --frozen --extra optimize

      - name: Run prompt optimization
        env:
          IN_AUTO: ${{ inputs.auto }}
          IN_NUM_CANDIDATES: ${{ inputs.num_candidates }}
          IN_NUM_TRIALS: ${{ inputs.num_trials }}
          IN_MAX_TOKENS: ${{ inputs.max_tokens }}
          IN_MINIBATCH_SIZE: ${{ inputs.minibatch_size }}
          IN_MAX_EXAMPLES: ${{ inputs.max_examples }}
          IN_DEMOS: ${{ inputs.demos }}
          IN_REVEAL: ${{ inputs.reveal }}
          IN_REVEAL_FRACTION: ${{ inputs.reveal_fraction }}
          IN_MODEL: ${{ inputs.model }}
        run: |
          ARGS="--auto $IN_AUTO --reveal $IN_REVEAL --reveal-fraction $IN_REVEAL_FRACTION"
          ARGS="$ARGS --demos $IN_DEMOS --max-tokens $IN_MAX_TOKENS"
          [ -n "$IN_NUM_CANDIDATES" ] && ARGS="$ARGS --num-candidates $IN_NUM_CANDIDATES"
          [ -n "$IN_NUM_TRIALS" ]     && ARGS="$ARGS --num-trials $IN_NUM_TRIALS"
          [ -n "$IN_MINIBATCH_SIZE" ] && ARGS="$ARGS --minibatch-size $IN_MINIBATCH_SIZE"
          [ -n "$IN_MAX_EXAMPLES" ]   && ARGS="$ARGS --max-examples $IN_MAX_EXAMPLES"
          [ -n "$IN_MODEL" ]          && ARGS="$ARGS --model $IN_MODEL"
          echo "Running: karels-crypto-optimize $ARGS"
          uv run karels-crypto-optimize $ARGS

      - name: Commit optimization results
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add optimization_results/
          if git diff --cached --quiet; then
            echo "No optimization result changes."
          else
            git commit -m "optimize: word-solver prompt (reveal=${{ inputs.reveal }}, auto=${{ inputs.auto }})"
            git push
          fi
