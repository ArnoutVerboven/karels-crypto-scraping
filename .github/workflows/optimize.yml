name: optimize

# Manually-triggered prompt optimization for the word solver (DSPy: MIPROv2 /
# COPRO / GEPA, selectable via the optimizer input).
# Configure credentials first (Settings -> Secrets and variables -> Actions):
#   - OPENAI_API_KEY  as a repository *secret* (sensitive)
#   - OPENAI_BASE_URL as a repository *variable* (not sensitive)
#   - OPENAI_MODEL    as a repository *variable* (optional; not sensitive)
# Results are committed to karels-crypto-solving/optimization_results/<optimizer>/.

on:
  workflow_dispatch:
    inputs:
      optimizer:
        description: "Technique"
        type: choice
        options: ["mipro", "copro", "gepa"]
        default: "mipro"
      model:
        description: "Task model (blank = OPENAI_MODEL variable / default)"
        type: string
        default: ""
      reflection_model:
        description: "GEPA reflection / proposer model (blank = task model)"
        type: string
        default: ""
      auto:
        description: "Budget preset (mipro/gepa)"
        type: choice
        options: ["light", "medium", "heavy", "none"]
        default: "light"
      reveal:
        description: "Helper letters revealed in the pattern"
        type: choice
        options: ["none", "partial", "all"]
        default: "none"
      reasoning_effort:
        description: "Reasoning effort for reasoning models"
        type: choice
        options: ["", "minimal", "low", "medium", "high"]
        default: "low"
      max_tokens:
        description: "Max output tokens per task-LM call"
        type: string
        default: "1000"
      num_threads:
        description: "Parallel eval threads"
        type: string
        default: "8"
      demos:
        description: "Max few-shot demos (0 = instruction-only)"
        type: string
        default: "0"
      max_examples:
        description: "Cap number of labelled words (blank = all)"
        type: string
        default: ""

permissions:
  contents: write

concurrency:
  group: optimize
  cancel-in-progress: false

jobs:
  optimize:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: karels-crypto-solving
    env:
      # The API key is sensitive -> secret. Base URL and model are not
      # sensitive -> repository variables (with a secret fallback, so it works
      # whichever you configure).
      OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
      OPENAI_BASE_URL: ${{ vars.OPENAI_BASE_URL || secrets.OPENAI_BASE_URL }}
      OPENAI_MODEL: ${{ vars.OPENAI_MODEL || secrets.OPENAI_MODEL }}
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true
          cache-dependency-glob: karels-crypto-solving/uv.lock

      - name: Sync dependencies (with optimize extra)
        run: uv sync --frozen --extra optimize

      - name: Run prompt optimization
        env:
          IN_OPTIMIZER: ${{ inputs.optimizer }}
          IN_MODEL: ${{ inputs.model }}
          IN_REFLECTION_MODEL: ${{ inputs.reflection_model }}
          IN_AUTO: ${{ inputs.auto }}
          IN_REVEAL: ${{ inputs.reveal }}
          IN_REASONING_EFFORT: ${{ inputs.reasoning_effort }}
          IN_MAX_TOKENS: ${{ inputs.max_tokens }}
          IN_NUM_THREADS: ${{ inputs.num_threads }}
          IN_DEMOS: ${{ inputs.demos }}
          IN_MAX_EXAMPLES: ${{ inputs.max_examples }}
        run: |
          ARGS="--optimizer $IN_OPTIMIZER --auto $IN_AUTO --reveal $IN_REVEAL"
          ARGS="$ARGS --demos $IN_DEMOS --max-tokens $IN_MAX_TOKENS --num-threads $IN_NUM_THREADS"
          [ -n "$IN_MODEL" ]            && ARGS="$ARGS --model $IN_MODEL"
          [ -n "$IN_REFLECTION_MODEL" ] && ARGS="$ARGS --reflection-model $IN_REFLECTION_MODEL"
          [ -n "$IN_REASONING_EFFORT" ] && ARGS="$ARGS --reasoning-effort $IN_REASONING_EFFORT"
          [ -n "$IN_MAX_EXAMPLES" ]     && ARGS="$ARGS --max-examples $IN_MAX_EXAMPLES"
          echo "Running: karels-crypto-optimize $ARGS"
          uv run karels-crypto-optimize $ARGS

      - name: Commit optimization results
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add optimization_results/
          if git diff --cached --quiet; then
            echo "No optimization result changes."
          else
            git commit -m "optimize: ${{ inputs.optimizer }} word-solver prompt (reveal=${{ inputs.reveal }})"
            git push
          fi
