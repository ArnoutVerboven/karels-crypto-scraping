name: scrape

# Karel's Crypto is published every Saturday by De Standaard. We scrape shortly
# after publication and commit the refreshed JSON datasets back to the repo.

on:
  schedule:
    # 06:30 UTC every Saturday (a little after the puzzle goes live).
    - cron: "30 6 * * 6"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: scrape
  cancel-in-progress: false

jobs:
  scrape:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - name: Sync dependencies
        run: uv sync --frozen

      - name: Scrape Karel's Crypto
        run: uv run karels-crypto

      - name: Commit updated datasets
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/
          if git diff --cached --quiet; then
            echo "No dataset changes this week."
          else
            git commit -m "data: weekly Karel's Crypto update ($(date -u +%Y-%m-%d))"
            git push
          fi
