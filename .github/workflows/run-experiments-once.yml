name: run-experiments-once

# TEMPORARY one-off: research experiments for the word-solver report.
# Phased; results committed at the end (even on failure). Removed after.
# (re-run: COPRO dev-set fix)

on:
  push:
    branches:
      - "cursor/**"
    paths:
      - ".github/workflows/run-experiments-once.yml"

permissions:
  contents: write

concurrency:
  group: experiments
  cancel-in-progress: true

jobs:
  experiments:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: karels-crypto-solving
    env:
      OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
      OPENAI_BASE_URL: ${{ vars.OPENAI_BASE_URL || secrets.OPENAI_BASE_URL }}
      MINI: gpt-5-mini-2025-08-07
      BIG: gpt-5.5-2026-04-23
    steps:
      - uses: actions/checkout@v4
      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true
          cache-dependency-glob: karels-crypto-solving/uv.lock
      - name: Sync
        run: uv sync --frozen --extra optimize

      # (Exp 1 capability, Exp 2 predictions+clustering, Exp 3 MIPROv2 already
      # committed; only COPRO + GEPA + transfer remain.)

      - name: Optimize COPRO
        run: |
          uv run karels-crypto-optimize --optimizer copro --model "$MINI" \
            --prompt-model "$BIG" --reasoning-effort low --breadth 4 --depth 2 \
            --val-fraction 0.1 --num-threads 16 --reveal none --output-dir research/opt
      - name: Optimize GEPA
        run: |
          uv run karels-crypto-optimize --optimizer gepa --model "$MINI" \
            --reflection-model "$BIG" --reasoning-effort low --max-metric-calls 400 \
            --reflection-minibatch-size 3 --val-fraction 0.1 --num-threads 16 \
            --reveal none --output-dir research/opt

      # --- Exp 4: transfer GEPA(mini) prompt to gpt-5.5 ------------------------
      - name: Eval GEPA-optimized on gpt-mini (val)
        run: |
          uv run karels-crypto-eval --program research/opt/gepa/optimized_word_solver.json \
            --model "$MINI" --reasoning-effort low --split val --val-fraction 0.1 \
            --num-threads 16 --output research/transfer_gepa_on_mini.json
      - name: Eval GEPA-optimized on gpt-5.5 (val)
        run: |
          uv run karels-crypto-eval --program research/opt/gepa/optimized_word_solver.json \
            --model "$BIG" --reasoning-effort low --split val --val-fraction 0.1 \
            --num-threads 16 --output research/transfer_gepa_on_5p5.json
      - name: Eval baseline on gpt-5.5 (val)
        run: |
          uv run karels-crypto-eval --model "$BIG" --reasoning-effort low \
            --split val --val-fraction 0.1 --num-threads 16 \
            --output research/baseline_5p5.json

      - name: Commit experiment outputs
        if: always()
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add research/ || true
          if git diff --cached --quiet; then
            echo "No experiment outputs to commit."
          else
            git commit -m "research: word-solver experiment outputs [skip ci]"
            git push
          fi
