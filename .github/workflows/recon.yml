name: recon

# Investigative workflow: runs on a GitHub-hosted runner (full internet access)
# to capture the raw HTML / JS / candidate API responses of the Karel's Crypto
# single-page-app. Results are uploaded as an artifact for offline inspection.
# This workflow is temporary scaffolding and can be removed once the data source
# is understood.

on:
  push:
    branches:
      - "cursor/**"
    paths:
      - "scripts/recon.py"
      - "scripts/recon_graphql.py"
      - ".github/workflows/recon.yml"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  recon:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5

      - name: Run reconnaissance
        run: uv run --with requests python scripts/recon.py

      - name: Query GraphQL API
        run: uv run --with requests python scripts/recon_graphql.py

      - name: Commit recon output back to branch
        if: always()
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -f recon_output/ || true
          if git diff --cached --quiet; then
            echo "No recon output to commit"
          else
            git commit -m "chore(recon): capture raw data source output [skip ci]"
            git push origin HEAD:${GITHUB_REF_NAME}
          fi
