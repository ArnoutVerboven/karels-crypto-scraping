name: run-optimizers-smoke

# TEMPORARY: validate all three optimizer code paths (mipro/copro/gepa) end-to-end
# on a real runner with tiny budgets. Commits the small results. Removed after.

on:
  push:
    branches:
      - "cursor/**"
    paths:
      - ".github/workflows/run-optimizers-smoke.yml"

permissions:
  contents: write

jobs:
  optimizers-smoke:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: karels-crypto-solving
    env:
      OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
      OPENAI_BASE_URL: ${{ vars.OPENAI_BASE_URL || secrets.OPENAI_BASE_URL }}
      MODEL: gpt-5-mini-2025-08-07
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true
          cache-dependency-glob: karels-crypto-solving/uv.lock

      - name: Sync (with optimize extra)
        run: uv sync --frozen --extra optimize

      - name: Run COPRO (re-validate after temperature fix)
        run: |
          common="--model $MODEL --reasoning-effort low --reveal none --max-examples 12 --num-threads 8"
          echo "===== COPRO ====="
          uv run karels-crypto-optimize --optimizer copro $common --breadth 2 --depth 1

      - name: Commit results
        if: always()
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add optimization_results/
          if git diff --cached --quiet; then
            echo "No result changes."
          else
            git commit -m "optimize: smoke results for mipro/copro/gepa [skip ci]"
            git push
          fi
