name: run-benchmark-once

# TEMPORARY one-off: run the model-comparison benchmark on push (since
# workflow_dispatch can't be triggered programmatically here) and commit the
# results. Removed right after the run.

on:
  push:
    branches:
      - "cursor/**"
    paths:
      - ".github/workflows/run-benchmark-once.yml"

permissions:
  contents: write

jobs:
  benchmark-once:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: karels-crypto-solving
    env:
      OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
      OPENAI_BASE_URL: ${{ vars.OPENAI_BASE_URL || secrets.OPENAI_BASE_URL }}
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true
          cache-dependency-glob: karels-crypto-solving/uv.lock

      - name: Sync dependencies
        run: uv sync --frozen

      - name: Run benchmark (spread of models)
        # reasoning-effort low + concurrency keeps reasoning models fast/cheap;
        # --max-tokens 16000 just stops them returning empty.
        run: |
          uv run karels-crypto-benchmark \
            --limit 20 --reveal none \
            --reasoning-effort low --num-threads 8 --max-tokens 16000 \
            --models \
              gpt-3.5-turbo \
              gpt-4o-mini \
              gpt-4o \
              gpt-4.1-mini \
              gpt-4.1 \
              o4-mini \
              gpt-5-nano-2025-08-07 \
              gpt-5-mini-2025-08-07 \
              gpt-5-2025-08-07 \
              gpt-5.5-2026-04-23

      - name: Commit benchmark results
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add benchmark_results/
          if git diff --cached --quiet; then
            echo "No benchmark result changes."
          else
            git commit -m "benchmark: model comparison on word solving [skip ci]"
            git push
          fi
