name: run-optimize-once

# TEMPORARY one-off: trigger a bounded prompt-optimization run on push (since
# workflow_dispatch can't be triggered programmatically here) to produce
# baseline + optimized metrics. Cost is bounded via a small manual budget.
# This file is removed right after the run.

on:
  push:
    branches:
      - "cursor/**"
    paths:
      - ".github/workflows/run-optimize-once.yml"

permissions:
  contents: write

jobs:
  optimize-once:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: karels-crypto-solving
    env:
      OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
      OPENAI_BASE_URL: ${{ vars.OPENAI_BASE_URL || secrets.OPENAI_BASE_URL }}
      OPENAI_MODEL: ${{ vars.OPENAI_MODEL || secrets.OPENAI_MODEL }}
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true
          cache-dependency-glob: karels-crypto-solving/uv.lock

      - name: Sync (with optimize extra)
        run: uv sync --frozen --extra optimize

      - name: Run bounded optimization
        run: |
          uv run karels-crypto-optimize \
            --auto none --num-candidates 3 --num-trials 4 \
            --max-tokens 800 --reveal none

      - name: Commit optimization results
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add optimization_results/
          if git diff --cached --quiet; then
            echo "No optimization result changes."
          else
            git commit -m "optimize: baseline + optimized word-solver metrics [skip ci]"
            git push
          fi
