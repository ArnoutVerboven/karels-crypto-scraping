name: run-optimize-5mini-once

# TEMPORARY one-off: optimize the word-solver prompt against gpt-5-mini (low
# reasoning effort) on the full scraped word set. No few-shot demos, no revealed
# letters. Removed right after the run.

on:
  push:
    branches:
      - "cursor/**"
    paths:
      - ".github/workflows/run-optimize-5mini-once.yml"

permissions:
  contents: write

jobs:
  optimize-once:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: karels-crypto-solving
    env:
      OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
      OPENAI_BASE_URL: ${{ vars.OPENAI_BASE_URL || secrets.OPENAI_BASE_URL }}
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true
          cache-dependency-glob: karels-crypto-solving/uv.lock

      - name: Sync (with optimize extra)
        run: uv sync --frozen --extra optimize

      - name: Optimize prompt on gpt-5-mini (low reasoning, full set)
        run: |
          uv run karels-crypto-optimize \
            --model gpt-5-mini-2025-08-07 \
            --reasoning-effort low \
            --auto light --reveal none --demos 0 \
            --num-threads 8

      - name: Commit optimization results
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add optimization_results/
          if git diff --cached --quiet; then
            echo "No optimization result changes."
          else
            git commit -m "optimize: gpt-5-mini (low effort) word-solver prompt, full set [skip ci]"
            git push
          fi
