name: smoke

# Lightweight health check: confirms the OpenAI credentials / variables work
# end-to-end from Actions (both the plain `openai` path and the DSPy path) with
# a couple of LLM calls. Commits nothing. Run manually from the Actions tab,
# e.g. to verify OPENAI_MODEL before launching a full optimization run.

on:
  workflow_dispatch:

jobs:
  smoke:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: karels-crypto-solving
    env:
      OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
      OPENAI_BASE_URL: ${{ vars.OPENAI_BASE_URL || secrets.OPENAI_BASE_URL }}
      ANTHROPIC_BASE_URL: ${{ vars.ANTHROPIC_BASE_URL || secrets.ANTHROPIC_BASE_URL }}
      GOOGLE_BASE_URL: ${{ vars.GOOGLE_BASE_URL || secrets.GOOGLE_BASE_URL }}
      OPENAI_MODEL: ${{ vars.OPENAI_MODEL || secrets.OPENAI_MODEL }}
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5

      - name: Sync (with optimize extra)
        run: uv sync --frozen --extra optimize

      - name: Show config (no secrets)
        run: |
          python - <<'PY'
          import os
          for k in ("OPENAI_API_KEY", "OPENAI_BASE_URL", "ANTHROPIC_BASE_URL", "GOOGLE_BASE_URL"):
              print(f"{k:20} set={bool(os.environ.get(k))}")
          print("model:", os.environ.get("OPENAI_MODEL") or "(default)")
          PY

      - name: Word solver smoke (openai path, 2 clues)
        run: uv run karels-crypto-solve word --limit 2

      - name: Multi-provider probe (OpenAI / Anthropic / Google)
        if: always()
        run: |
          uv run python - <<'PY'
          from karels_crypto_solving import providers
          targets = {
              "openai": "gpt-4o-mini",
              "anthropic": "claude-haiku-4-5-20251001",
              "google": "gemini-3-flash-preview",
          }
          for prov, model in targets.items():
              try:
                  r = providers.chat(model=model, system="You are concise.",
                                     user="Reply with one Dutch word for 'house'.",
                                     max_tokens=256, temperature=0.0)
                  print(f"[OK]   {prov:9} {model:32} -> {r.text!r}")
              except Exception as exc:  # noqa: BLE001
                  print(f"[FAIL] {prov:9} {model:32} -> {type(exc).__name__}: {exc}")
          PY

      - name: DSPy smoke (1 LLM call)
        if: always()
        run: |
          uv run python - <<'PY'
          from karels_crypto_solving import config
          from karels_crypto_solving.optimization.optimize import _configure_lm
          from karels_crypto_solving.optimization.program import build_program
          config.load_env()
          _configure_lm(None, 256, None)
          pred = build_program()(cryptogram="Italia, Ninove", pattern="_____")
          print("dspy prediction:", getattr(pred, "solution", None))
          PY
