name: run-gepa-full-once

# TEMPORARY one-off: GEPA on the FULL set (scraped + ingested), budget-capped to
# ~10 EUR / ~30 min. gpt-5.4-mini task + gpt-5.5 reflection, low effort.
# Push-triggered; removed after the run. (re-run after token refresh)

on:
  push:
    branches:
      - "cursor/**"
    paths:
      - ".github/workflows/run-gepa-full-once.yml"

permissions:
  contents: write

concurrency:
  group: gepa-full
  cancel-in-progress: true

jobs:
  gepa-full:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: karels-crypto-solving
    env:
      OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
      OPENAI_BASE_URL: ${{ vars.OPENAI_BASE_URL || secrets.OPENAI_BASE_URL }}
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true
          cache-dependency-glob: karels-crypto-solving/uv.lock

      - name: Sync (with optimize extra)
        run: uv sync --frozen --extra optimize

      - name: GEPA on full set (budget-capped)
        run: |
          uv run karels-crypto-optimize \
            --optimizer gepa \
            --model gpt-5.4-mini-2026-03-17 \
            --reflection-model gpt-5.5-2026-04-23 \
            --reasoning-effort low \
            --max-metric-calls 700 \
            --reflection-minibatch-size 3 \
            --num-threads 16 \
            --val-fraction 0.09 \
            --reveal none

      - name: Commit results
        if: always()
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add optimization_results/
          if git diff --cached --quiet; then
            echo "No result changes."
          else
            git commit -m "optimize: GEPA on full set (budget-capped) [skip ci]"
            git push
          fi
