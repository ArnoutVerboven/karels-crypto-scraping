name: provider-smoke

# TEMPORARY: verify the multi-provider path (OpenAI / Anthropic / Google) works
# end-to-end through the gateway. Triggers on push to this file (so I can run it
# without manual dispatch) and is also dispatchable. Makes a handful of cheap LLM
# calls; commits nothing (read the run logs).

on:
  workflow_dispatch:
  push:
    paths:
      - ".github/workflows/provider-smoke.yml"

jobs:
  provider-smoke:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: karels-crypto-solving
    env:
      OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
      OPENAI_BASE_URL: ${{ vars.OPENAI_BASE_URL || secrets.OPENAI_BASE_URL }}
      ANTHROPIC_BASE_URL: ${{ vars.ANTHROPIC_BASE_URL || secrets.ANTHROPIC_BASE_URL }}
      GOOGLE_BASE_URL: ${{ vars.GOOGLE_BASE_URL || secrets.GOOGLE_BASE_URL }}
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5

      - name: Sync
        run: uv sync --frozen

      - name: Which provider variables are set (booleans only)
        run: |
          python - <<'PY'
          import os
          for k in ("OPENAI_API_KEY", "OPENAI_BASE_URL", "ANTHROPIC_BASE_URL", "GOOGLE_BASE_URL"):
              print(f"{k:20} set={bool(os.environ.get(k))}")
          PY

      - name: Probe each provider via providers.chat
        run: |
          uv run python - <<'PY'
          from karels_crypto_solving import providers
          # One cheap model per provider (from model_registry.json).
          targets = {
              "openai": "gpt-4o-mini",
              "anthropic": "claude-haiku-4-5-20251001",
              "google": "gemini-3-flash-preview",
          }
          prompt = "Reply with exactly one Dutch word, 4 letters, meaning 'house'."
          for prov, model in targets.items():
              try:
                  r = providers.chat(model=model, system="You are concise.", user=prompt,
                                     max_tokens=64, temperature=0.0)
                  print(f"[OK]   {prov:9} {model:32} -> {r.text!r} "
                        f"(in={r.prompt_tokens}, out={r.completion_tokens})")
              except Exception as exc:  # noqa: BLE001 - smoke test wants the message
                  print(f"[FAIL] {prov:9} {model:32} -> {type(exc).__name__}: {exc}")
          PY

      - name: Tiny cross-provider benchmark (3 clues each)
        if: always()
        run: |
          uv run karels-crypto-benchmark \
            --models gpt-4o-mini claude-haiku-4-5-20251001 gemini-3-flash-preview \
            --limit 3 --output-dir /tmp/bench || true
          echo "--- benchmark.md ---"
          cat /tmp/bench/benchmark.md 2>/dev/null || echo "(no benchmark output)"
