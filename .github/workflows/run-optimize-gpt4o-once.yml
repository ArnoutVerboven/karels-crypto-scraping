name: run-optimize-gpt4o-once

# TEMPORARY one-off: optimize the word-solver prompt against gpt-4o on the full
# scraped word set (push-triggered since workflow_dispatch can't be triggered
# programmatically here). Removed right after the run.

on:
  push:
    branches:
      - "cursor/**"
    paths:
      - ".github/workflows/run-optimize-gpt4o-once.yml"

permissions:
  contents: write

jobs:
  optimize-once:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: karels-crypto-solving
    env:
      OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
      OPENAI_BASE_URL: ${{ vars.OPENAI_BASE_URL || secrets.OPENAI_BASE_URL }}
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true
          cache-dependency-glob: karels-crypto-solving/uv.lock

      - name: Sync (with optimize extra)
        run: uv sync --frozen --extra optimize

      - name: Optimize prompt on gpt-4o (full 38-word set)
        # No --max-examples => use all scraped words. gpt-4o is non-reasoning,
        # so a modest token budget is plenty.
        run: |
          uv run karels-crypto-optimize \
            --model gpt-4o --auto light --reveal none --max-tokens 2000

      - name: Commit optimization results
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add optimization_results/
          if git diff --cached --quiet; then
            echo "No optimization result changes."
          else
            git commit -m "optimize: gpt-4o word-solver prompt on full word set [skip ci]"
            git push
          fi
